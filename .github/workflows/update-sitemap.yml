name: update-sitemap

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Regenerate sitemap
        run: python scripts/update_sitemap.py

      - name: Commit sitemap if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/sitemap.xml

          if git diff --cached --quiet; then
            echo "No sitemap changes to commit."
            exit 0
          fi

          git commit -m "chore(docs): refresh sitemap"

          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            echo "Push attempt ${i} failed; retrying..."
            sleep 2
          done

          echo "Failed to push sitemap update after retries."
          exit 1
